---
name: Swift Tests

on:
    pull_request:
    push:
        branches: [main]

jobs:
    test:
        name: swift test
        runs-on: macos-26
        steps:
            - uses: actions/checkout@v7

            - name: Select Xcode
              run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"

            - name: Run tests
              run: swift test --package-path tests/swift-tests
