---
name: Swift Tests

on:
    pull_request:
    push:
        branches: [main]

jobs:
    test:
        name: swift test
        runs-on: macos-15
        steps:
            - uses: actions/checkout@v4

            - name: Select Xcode
              run: sudo xcode-select -s /Applications/Xcode.app

            - name: Run tests
              run: swift test --package-path tests/swift-tests
